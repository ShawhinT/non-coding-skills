<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>File mock template</title>
<!--
  FILE MOCK TEMPLATE
  ==================
  Scaffold for an IDE-style file window. Use for any "show a code/config file"
  beat — SKILL.md, README, settings, YAML, JSON, etc.

  Structure:
    - .titlebar         macOS-style traffic-light dots + mono filename
    - .frontmatter      cerulean-keyed "keys" + neutral "values" (stylized YAML)
                        with a faint horizontal divider below
    - .instructions     neutral skeleton lines of varying widths (the body)

  The lines in .frontmatter and .instructions are RECTANGLES, not text — they
  represent code/markdown abstractly so the viewer reads "this is a file"
  without trying to parse content. If you want real text, replace the .key /
  .val / .iline rectangles with actual <span>s.

  Animation pattern shown:
    - File fades in
    - Three pill labels (Process / Context / Tools) appear on the LEFT,
      then migrate INTO the file body as a horizontal row, then fade out
      as the instruction skeleton lines appear (i.e., the labels "become"
      the body content).

  This is the pattern from "what is a skill?" — the migration physically
  enacts the metaphor that the labels live inside the file. Strip the
  labels + migration if you just need a static file mock.

  Source of truth:
    The "skill anatomy" clip from the 15-hr/wk video.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #010413;
    --primary: #087CA7;          /* override per brand */
    --bone: rgba(255, 255, 255, 0.94);
    --muted: rgba(255, 255, 255, 0.55);
    --faint: rgba(255, 255, 255, 0.10);
    --panel-bg: rgba(255, 255, 255, 0.045);
    --panel-edge: rgba(255, 255, 255, 0.13);
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  }

  html, body { margin: 0; padding: 0; background: var(--bg); }
  body {
    width: 100vw; height: 100vh;
    display: grid; place-items: center;
    color: var(--bone);
    overflow: hidden;
    font-family: 'Manrope', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .stage {
    width: min(1920px, 100vw);
    aspect-ratio: 16 / 9;
    position: relative;
    background:
      radial-gradient(ellipse 60% 50% at 50% 50%, rgba(8, 124, 167, 0.10) 0%, transparent 70%),
      var(--bg);
    overflow: hidden;
  }

  /* Pair container positioned absolutely so labels can migrate freely. */
  .pair {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 1280px;
    height: 700px;
  }

  /* Labels start as a vertical stack on the LEFT. */
  .labels {
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 26px;
    width: 260px;
    align-items: center;
  }
  .pill {
    padding: 18px 36px;
    border-radius: 999px;
    border: 1px solid var(--panel-edge);
    background: var(--panel-bg);
    color: var(--bone);
    font-size: 32px;
    font-weight: 600;
    text-align: center;
    white-space: nowrap;
    opacity: 0;
    transform-origin: center center;
    animation:
      fade-in-pill 0.7s var(--ease-out) forwards,
      migrate-pill 1.0s var(--ease-out) forwards,
      fade-out-pill 0.5s var(--ease-out) forwards;
  }
  .pill.l1 { animation-delay: 0.00s, 1.80s, 2.80s; --tx: 600px; --ty: 160px; }
  .pill.l2 { animation-delay: 0.20s, 1.80s, 2.80s; --tx: 720px; --ty:  60px; }
  .pill.l3 { animation-delay: 0.40s, 1.80s, 2.80s; --tx: 840px; --ty: -40px; }

  @keyframes fade-in-pill {
    from { opacity: 0; transform: translateY(8px) scale(1); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  /* Migration: shift right and scale down, landing as a horizontal row in
     the file's body area. Per-pill --tx/--ty hit different column positions. */
  @keyframes migrate-pill {
    0%   { opacity: 1; transform: translate(0, 0) scale(1); }
    100% { opacity: 1; transform: translate(var(--tx, 0px), var(--ty, 0px)) scale(0.5); }
  }
  @keyframes fade-out-pill {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }

  /* SKILL.md-style file window — pinned to the right of the pair. */
  .file {
    position: absolute;
    right: 0; top: 50%;
    transform: translateY(-50%);
    width: 740px;
    border-radius: 18px;
    border: 1px solid var(--panel-edge);
    background: rgba(255, 255, 255, 0.025);
    overflow: hidden;
    opacity: 0;
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    animation: fade-in-file 0.9s var(--ease-out) forwards;
    animation-delay: 0.80s;
  }
  @keyframes fade-in-file {
    from { opacity: 0; transform: translateY(calc(-50% + 10px)); }
    to   { opacity: 1; transform: translateY(-50%); }
  }
  .file .titlebar {
    display: flex; align-items: center;
    gap: 12px;
    padding: 18px 24px;
    border-bottom: 1px solid var(--faint);
    background: rgba(255, 255, 255, 0.02);
  }
  .file .titlebar .dot {
    width: 14px; height: 14px; border-radius: 50%;
    background: rgba(255, 255, 255, 0.18);
  }
  .file .name {
    margin-left: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }
  .file .body {
    padding: 36px 38px 42px;
    display: flex; flex-direction: column; gap: 16px;
  }
  /* Frontmatter — keys in primary color, values in neutral. */
  .file .frontmatter {
    display: flex; flex-direction: column; gap: 14px;
    padding-bottom: 26px;
    border-bottom: 1px solid var(--faint);
    margin-bottom: 10px;
  }
  .file .fm-row { display: flex; gap: 16px; align-items: center; }
  .file .key {
    height: 14px;
    border-radius: 5px;
    background: var(--primary);
    opacity: 0.85;
  }
  .file .val {
    height: 14px;
    border-radius: 5px;
    background: rgba(255, 255, 255, 0.18);
  }
  .file .fm-row:nth-child(1) .key { width: 120px; }
  .file .fm-row:nth-child(1) .val { width: 330px; }
  .file .fm-row:nth-child(2) .key { width: 156px; }
  .file .fm-row:nth-child(2) .val { width: 260px; }
  .file .fm-row:nth-child(3) .key { width: 132px; }
  .file .fm-row:nth-child(3) .val { width: 300px; }

  /* Body skeleton — starts hidden, fades in AFTER the labels arrive
     (so the labels appear to "become" the content). */
  .file .instructions {
    display: flex; flex-direction: column; gap: 14px;
    min-height: 200px;
    opacity: 0;
    animation: fade-in-instructions 0.8s var(--ease-out) forwards;
    animation-delay: 2.80s;
  }
  @keyframes fade-in-instructions {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .file .iline {
    height: 14px;
    border-radius: 5px;
    background: rgba(255, 255, 255, 0.13);
  }
  .file .iline.w1 { width: 96%; }
  .file .iline.w2 { width: 78%; }
  .file .iline.w3 { width: 86%; }
  .file .iline.w4 { width: 62%; }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001s !important; animation-delay: 0s !important; }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="pair">
      <div class="labels">
        <div class="pill l1">Process</div>
        <div class="pill l2">Context</div>
        <div class="pill l3">Tools</div>
      </div>
      <div class="file">
        <div class="titlebar">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          <span class="name">SKILL.md</span>
        </div>
        <div class="body">
          <div class="frontmatter">
            <div class="fm-row"><div class="key"></div><div class="val"></div></div>
            <div class="fm-row"><div class="key"></div><div class="val"></div></div>
            <div class="fm-row"><div class="key"></div><div class="val"></div></div>
          </div>
          <div class="instructions">
            <div class="iline w1"></div>
            <div class="iline w2"></div>
            <div class="iline w3"></div>
            <div class="iline w4"></div>
            <div class="iline w2"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
</content>
</invoke>
