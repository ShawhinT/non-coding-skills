<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Connectors vs Skills</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Libre+Franklin:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #087CA7;
    --bg: #FAFAF7;
    --surface: #FFFFFF;
    --ink: #0A0A0A;
    --ink-muted: rgba(0,0,0,0.55);
    --border: rgba(0,0,0,0.14);
    --line: rgba(0,0,0,0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1080px;
    height: 820px;
    background: var(--bg);
    font-family: 'Libre Franklin', system-ui, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    position: relative;
  }

  .canvas {
    width: 1080px;
    height: 820px;
    padding: 40px 90px 70px 90px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 36px;
    align-items: stretch;
  }

  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 48px 48px 56px 48px;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    min-width: 0;
  }

  /* graphic area — fixed height for both cards so they stay aligned */
  .graphic {
    width: 100%;
    height: 320px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 36px;
  }

  /* Connectors hub-and-spoke */
  .hub {
    position: relative;
    width: 320px;
    height: 320px;
  }
  .hub .center {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 110px;
    height: 110px;
    transform: translate(-50%, -50%);
    background: #FFFFFF;
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    border: 1.5px solid rgba(0,0,0,0.08);
  }
  .hub .center img { width: 78px; height: 78px; }

  .hub .spoke {
    position: absolute;
    width: 76px;
    height: 76px;
    background: #FFFFFF;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    border: 1.5px solid rgba(0,0,0,0.08);
  }
  .hub .spoke img, .hub .spoke svg { width: 46px; height: 46px; }

  /* 5 spokes at 90°, 162°, 234°, 306°, 18°  — top, bottom-left, bottom-right then around */
  .s1 { top: 0;    left: 50%; transform: translate(-50%, 0); }            /* 12 o'clock */
  .s2 { top: 50%;  left: 0;   transform: translate(0, -50%); }            /* 9 o'clock */
  .s3 { top: 50%;  right: 0;  transform: translate(0, -50%); }            /* 3 o'clock */
  .s4 { bottom: 0; left: 18%; }                                            /* 7-ish */
  .s5 { bottom: 0; right: 18%; }                                           /* 5-ish */

  /* connecting lines as SVG behind the dots */
  .hub svg.lines {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  /* Skills directory tree */
  .tree {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    line-height: 1.55;
    color: var(--ink);
    white-space: pre;
    text-align: left;
  }
  .tree .folder { color: var(--primary); font-weight: 600; }
  .tree .file  { color: var(--ink); }
  .tree .muted { color: var(--ink-muted); }

  .word {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 64px;
    line-height: 1;
    letter-spacing: -0.03em;
    margin-bottom: 16px;
    text-align: left;
  }

  .eq {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    color: var(--primary);
    letter-spacing: 0.02em;
    margin-bottom: 24px;
    text-align: left;
  }

  .line {
    font-family: 'Libre Franklin', sans-serif;
    font-size: 26px;
    font-weight: 500;
    line-height: 1.3;
    color: var(--ink);
    text-align: left;
  }

  .footer {
    position: absolute;
    bottom: 22px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--ink-muted);
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
<div class="canvas">

  <div class="split">

    <!-- CONNECTORS -->
    <div class="card">
      <div class="word">Connectors</div>
      <div class="eq">= capability</div>
      <div class="line">Give Claude access to your apps.</div>
      <div class="graphic">
        <div class="hub">
          <svg class="lines" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
            <g stroke="rgba(0,0,0,0.18)" stroke-width="2" stroke-dasharray="4 5">
              <line x1="160" y1="160" x2="160" y2="38" />
              <line x1="160" y1="160" x2="38"  y2="160" />
              <line x1="160" y1="160" x2="282" y2="160" />
              <line x1="160" y1="160" x2="95"  y2="282" />
              <line x1="160" y1="160" x2="225" y2="282" />
            </g>
          </svg>
          <div class="spoke s1"><img src="assets/gmail.png" alt="Gmail"/></div>
          <div class="spoke s2"><img src="assets/gcal.png" alt="Google Calendar"/></div>
          <div class="spoke s3"><img src="assets/jira.svg" alt="Jira"/></div>
          <div class="spoke s4"><img src="assets/notion.svg" alt="Notion"/></div>
          <div class="spoke s5"><img src="assets/stripe.svg" alt="Stripe"/></div>
          <div class="center"><img src="assets/claude.png" alt="Claude"/></div>
        </div>
      </div>
    </div>

    <!-- SKILLS -->
    <div class="card">
      <div class="word">Skills</div>
      <div class="eq">= competence</div>
      <div class="line">Teach Claude how to use them.</div>
      <div class="graphic">
        <div class="tree"><span class="folder">my-skill/</span>
<span class="muted">├──</span> <span class="file">SKILL.md</span>
<span class="muted">├──</span> <span class="folder">references/</span>
<span class="muted">│   └──</span> <span class="file">examples.md</span>
<span class="muted">└──</span> <span class="folder">scripts/</span>
<span class="muted">    └──</span> <span class="file">render.py</span></div>
      </div>
    </div>

  </div>

</div>

<div class="footer">@shawhintalebi</div>

</body>
</html>
